<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqua IQ Pro | Sri Lanka Live Bus Tracker</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #050608; color: #e2e8f0; overflow-x: hidden; }
        .panel { background: rgba(15, 20, 30, 0.9); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; }
        .seat { width: 20px; height: 20px; border-radius: 4px; border: 1px solid rgba(34, 211, 238, 0.2); cursor: pointer; transition: 0.3s; }
        .seat.booked { background: #222; border: none; cursor: not-allowed; }
        .seat.selected { background: #22d3ee; box-shadow: 0 0 10px #22d3ee; }
        #map { height: 400px; border-radius: 16px; border: 1px solid rgba(34, 211, 238, 0.3); z-index: 1; }
        .alert-active { animation: emergency 1s infinite; border: 1px solid #ef4444 !important; }
        @keyframes emergency { 0%, 100% { background: rgba(239, 68, 68, 0.05); } 50% { background: rgba(239, 68, 68, 0.25); } }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #22d3ee; }
    </style>
</head>
<body class="p-4 lg:p-6">

    <header class="flex flex-col lg:flex-row justify-between items-center mb-6 gap-4 border-b border-white/5 pb-4">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-cyan-500 rounded flex items-center justify-center shadow-lg shadow-cyan-500/30">
                <i class="fas fa-bus-alt text-black text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold uppercase italic tracking-tighter">Aqua <span class="text-cyan-400">IQ Pro</span></h1>
                <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest" id="espStatus">ESP32: DISCONNECTED</p>
            </div>
        </div>

        <div class="panel p-2 flex items-center gap-4 bg-white/5">
            <input type="text" id="startLoc" placeholder="From: Kiribathgoda" class="bg-transparent border-none text-cyan-400 text-[10px] outline-none w-28 px-2">
            <div class="w-[1px] h-4 bg-white/10"></div>
            <input type="text" id="endLoc" placeholder="To: Kadawatha" class="bg-transparent border-none text-cyan-400 text-[10px] outline-none w-28 px-2">
            <button onclick="calculateTrip()" class="bg-cyan-500 text-black font-bold text-[9px] px-4 py-1.5 rounded hover:bg-cyan-400 uppercase tracking-widest">Search</button>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-5">
        <aside class="lg:col-span-3 space-y-4">
            <div class="panel p-5">
                <h3 class="text-[9px] font-bold text-cyan-400 uppercase tracking-widest mb-4 italic">Bus Seat Layout</h3>
                <div class="grid grid-cols-4 gap-2 mb-4" id="seatGrid"></div>
                <button onclick="alert('Booking Confirmed!')" class="w-full bg-cyan-500/10 border border-cyan-500/30 text-cyan-400 text-[9px] py-2 rounded uppercase font-bold hover:bg-cyan-500 hover:text-black transition-all">Confirm Booking</button>
            </div>

            <div class="panel p-5 border-l-4 border-cyan-500">
                <p class="text-[9px] text-gray-500 uppercase font-bold mb-1">Trip Fare (LKR)</p>
                <h2 id="fareVal" class="text-2xl font-bold">0.00</h2>
                <div class="flex justify-between mt-3 text-[9px] text-gray-500 uppercase font-bold">
                    <span>Dist: <b id="tripDist" class="text-white">0km</b></span>
                    <span>Fuel: <b id="fuelVal" class="text-white">74%</b></span>
                </div>
            </div>
        </aside>

        <div class="lg:col-span-6 space-y-4">
            <div id="map"></div>

            <div class="grid grid-cols-2 gap-4">
                <div id="brakeCard" class="panel p-4 flex justify-between items-center transition-all">
                    <div>
                        <p class="text-[9px] text-gray-500 uppercase font-bold">Brake Temp</p>
                        <span id="brakeTemp" class="text-xl font-bold">32°C</span>
                    </div>
                    <i id="brakeIcon" class="fas fa-circle text-[8px] text-green-500"></i>
                </div>
                
                <div class="panel p-4 flex justify-between items-center">
                    <div>
                        <p class="text-[9px] text-gray-500 uppercase font-bold">Oil Turbidity</p>
                        <span id="oilDensity" class="text-xl font-bold text-cyan-400">0</span>
                    </div>
                    <span class="text-[9px] text-gray-600 font-bold">NTU/PPM</span>
                </div>
            </div>
            
            <div class="panel p-4 flex justify-between items-center">
                <div>
                    <p class="text-[9px] text-gray-500 uppercase font-bold">Current Speed</p>
                    <span id="speed" class="text-xl font-bold text-white">0</span> <span class="text-[10px]">KM/H</span>
                </div>
                <i class="fas fa-tachometer-alt text-gray-600"></i>
            </div>
        </div>

        <aside class="lg:col-span-3 space-y-4">
            <div class="panel p-6 text-center bg-gradient-to-br from-cyan-500/5 to-transparent">
                <p class="text-[10px] text-gray-500 uppercase font-bold mb-2">Live Passengers</p>
                <h1 id="pCount" class="text-8xl font-black italic">0</h1>
                <div class="flex gap-2 mt-6">
                    <div class="flex-1 bg-white/5 p-2 rounded text-[10px]">IN: <span id="d1">0</span></div>
                    <div class="flex-1 bg-white/5 p-2 rounded text-[10px]">OUT: <span id="d2">0</span></div>
                </div>
            </div>
            <div class="panel p-4">
                <canvas id="pChart" height="150"></canvas>
            </div>
        </aside>
    </div>

    <script>
        const IP = "10.109.244.222"; // ESP32 IP
        let map, busMarker, pChart;

        function init() {
            renderSeats();
            setupMap();
            setupChart();
            setInterval(fetchData, 2000); 
        }

        function setupMap() {
            map = L.map('map').setView([6.9271, 79.8612], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            const busIcon = L.icon({
                iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448339.png',
                iconSize: [35, 35]
            });
            busMarker = L.marker([6.9271, 79.8612], {icon: busIcon}).addTo(map);
        }

        async function fetchData() {
            try {
                const res = await fetch(`http://${IP}/data`);
                const data = await res.json();
                
                document.getElementById('espStatus').textContent = "ESP32: CONNECTED";
                document.getElementById('speed').textContent = data.speed;
                document.getElementById('pCount').textContent = data.pCount;
                document.getElementById('d1').textContent = data.d1;
                document.getElementById('d2').textContent = data.d2;
                document.getElementById('brakeTemp').textContent = data.brakeTemp + "°C";
                
                // Oil Density දත්තය update කිරීම
                document.getElementById('oilDensity').textContent = data.oilDensity || 0;

                const newPos = [data.lat, data.lng];
                busMarker.setLatLng(newPos);
                map.panTo(newPos);

                updateChart(data.pCount);
            } catch (e) {
                document.getElementById('espStatus').textContent = "ESP32: SYNC LOST";
            }
        }

        function renderSeats() {
            const grid = document.getElementById('seatGrid');
            grid.innerHTML = ""; // Clear existing
            for (let i = 1; i <= 28; i++) {
                const seat = document.createElement('div');
                seat.className = `seat ${Math.random() > 0.8 ? 'booked' : 'available'}`;
                if (!seat.classList.contains('booked')) seat.onclick = () => seat.classList.toggle('selected');
                grid.appendChild(seat);
            }
        }

        function setupChart() {
            const ctx = document.getElementById('pChart').getContext('2d');
            pChart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderColor: '#22d3ee', tension: 0.4 }] },
                options: { plugins: { legend: false }, scales: { x: { display: false }, y: { display: false } } }
            });
        }

        function updateChart(count) {
            pChart.data.labels.push("");
            pChart.data.datasets[0].data.push(count);
            if(pChart.data.labels.length > 10) { pChart.data.labels.shift(); pChart.data.datasets[0].data.shift(); }
            pChart.update();
        }

        function calculateTrip() {
            const start = document.getElementById('startLoc').value.toLowerCase();
            const end = document.getElementById('endLoc').value.toLowerCase();
            if(start && end) {
                document.getElementById('fareVal').textContent = "80.00";
                document.getElementById('tripDist').textContent = "12km";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
