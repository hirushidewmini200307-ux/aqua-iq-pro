<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqua IQ Pro | Global Fleet Master</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #050608; color: #e2e8f0; overflow-x: hidden; }
        .card { background: rgba(15, 20, 30, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; transition: 0.3s; }
        .card:hover { border-color: rgba(34, 211, 238, 0.4); transform: translateY(-2px); }
        #map { height: 400px; border-radius: 16px; border: 1px solid rgba(34, 211, 238, 0.2); z-index: 1; }
        .btn-cyan { background: #22d3ee; color: #000; font-weight: bold; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .input-dark { background: #0f172a; border: 1px solid #334155; color: #22d3ee; padding: 8px; border-radius: 8px; outline: none; }
        .alert-danger { animation: flash 1s infinite alternate; background: #ef4444; color: white; padding: 12px; text-align: center; font-weight: bold; border-radius: 8px; }
        @keyframes flash { from { opacity: 1; } to { opacity: 0.5; } }
    </style>
</head>
<body class="p-4 lg:p-6">

    <div id="proximityAlert" class="hidden alert-danger mb-4 text-xl uppercase tracking-widest">
        🚨 BUS IS NEARBY! (LESS THAN 500M) 🚨
    </div>

    <header class="flex flex-col lg:flex-row justify-between items-center mb-6 gap-4 border-b border-white/5 pb-6">
        <div class="flex items-center gap-3">
            <h1 class="text-3xl font-bold italic tracking-tighter">Aqua <span class="text-cyan-400">IQ Pro</span></h1>
            <span id="espStatus" class="text-[10px] text-red-500 font-bold uppercase ml-4 tracking-widest">ESP32: SCANNING...</span>
        </div>

        <div class="flex flex-wrap gap-2 items-center">
            <input type="text" id="fromLoc" placeholder="From (e.g. Maharagama)" class="input-dark text-xs w-40">
            <i class="fas fa-arrow-right text-gray-600"></i>
            <input type="text" id="toLoc" placeholder="To (e.g. Colombo)" class="input-dark text-xs w-40">
            <button onclick="exportToExcel()" class="btn-cyan text-xs"><i class="fas fa-file-excel mr-1"></i> EXCEL REPORT</button>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-3 space-y-4">
            <div class="card p-5 border-l-4 border-green-500">
                <h3 class="text-[10px] text-gray-500 uppercase font-bold">Total Daily Income</h3>
                <p class="text-4xl font-bold text-green-400 italic">Rs. <span id="income">0</span></p>
            </div>
            
            <div class="card p-5">
                <h3 class="text-[10px] text-gray-400 uppercase font-bold mb-3 italic">Live Speed Trend</h3>
                <canvas id="liveChart" height="180"></canvas>
            </div>

            <div class="card p-5">
                <h3 class="text-[10px] text-gray-400 uppercase font-bold mb-2">Service Status</h3>
                <div class="flex justify-between items-end">
                    <div>
                        <p class="text-xl font-bold"><span id="totalDist">0.00</span> <small class="text-xs">km</small></p>
                        <p id="maintStatus" class="text-[9px] text-cyan-500 font-bold uppercase tracking-widest">System Healthy</p>
                    </div>
                    <div id="fuelCircle" class="w-14 h-14 rounded-full border-4 border-cyan-500 flex items-center justify-center text-xs font-bold"><span id="fuelPct">100</span>%</div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-6 space-y-4">
            <div id="map"></div>
            <div class="grid grid-cols-3 gap-4">
                <div class="card p-4 text-center">
                    <span class="text-[9px] text-gray-500 uppercase font-bold">Current Speed</span>
                    <p class="text-2xl font-bold text-cyan-400"><span id="speed">0</span> <small class="text-xs uppercase">kmh</small></p>
                </div>
                <div class="card p-4 text-center">
                    <span class="text-[9px] text-gray-500 uppercase font-bold">Brake Temp</span>
                    <p class="text-2xl font-bold"><span id="brake">0</span>°C</p>
                </div>
                <div class="card p-4 text-center">
                    <span class="text-[9px] text-gray-500 uppercase font-bold">ETA</span>
                    <p class="text-xl font-bold text-yellow-400"><span id="eta">--</span> <small class="text-xs uppercase">min</small></p>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3 space-y-4">
            <div class="card p-5">
                <h3 class="text-[10px] text-gray-400 uppercase font-bold mb-3 flex justify-between">
                    Seat Reservation <span id="availSeats" class="text-cyan-400">50 Avail</span>
                </h3>
                <div class="grid grid-cols-4 gap-2 mb-4" id="seatLayout"></div>
                <button onclick="confirmBooking()" class="w-full btn-cyan text-[10px]">BOOK SELECTED SEATS</button>
            </div>

            <div class="card p-5">
                <h3 class="text-[10px] text-gray-400 uppercase font-bold mb-3 text-center">Fuel Consumption Trend</h3>
                <canvas id="fuelTrend" height="150"></canvas>
            </div>
            
            <div class="card p-4 text-center">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Active Passengers: <span id="pCount" class="text-white">0</span></p>
            </div>
        </div>
    </div>

    <script>
        const IP = "10.109.244.222";
        let map, busMarker, pathLine, liveChart, fuelTrend;
        let busHistory = [], totalDistance = 0, lastPos = null, bookedSeatsCount = 0;
        let userLocation = [6.9271, 79.8612]; // Default location for 500m alert

        function init() {
            map = L.map('map').setView([6.9271, 79.8612], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            busMarker = L.marker([6.9271, 79.8612]).addTo(map);
            pathLine = L.polyline([], {color: '#22d3ee', weight: 4}).addTo(map);

            setupCharts();
            renderSeats();
            setInterval(updateData, 1500);
        }

        function renderSeats() {
            const layout = document.getElementById('seatLayout');
            for(let i=1; i<=12; i++) {
                layout.innerHTML += `<div onclick="this.classList.toggle('bg-cyan-500'); this.classList.toggle('text-black'); this.classList.toggle('booked')" class="h-8 w-8 rounded border border-white/10 flex items-center justify-center text-[10px] cursor-pointer hover:border-cyan-500 transition-all">${i}</div>`;
            }
        }

        function setupCharts() {
            const opts = { plugins: { legend: false }, scales: { x: { display: false }, y: { display: false } } };
            liveChart = new Chart(document.getElementById('liveChart'), {
                type: 'line',
                data: { labels: Array(15).fill(''), datasets: [{ data: [], borderColor: '#22d3ee', tension: 0.4, pointRadius: 0 }] },
                options: opts
            });
            fuelTrend = new Chart(document.getElementById('fuelTrend'), {
                type: 'line',
                data: { labels: Array(15).fill(''), datasets: [{ data: [], borderColor: '#3b82f6', fill: true, backgroundColor: 'rgba(59, 130, 246, 0.1)', tension: 0.4, pointRadius: 0 }] },
                options: opts
            });
        }

        async function updateData() {
            try {
                const res = await fetch(`http://${IP}/data`);
                const data = await res.json();

                document.getElementById('espStatus').innerText = "ESP32: CONNECTED";
                document.getElementById('espStatus').className = "text-[10px] text-cyan-400 font-bold uppercase ml-4 tracking-widest";

                document.getElementById('income').innerText = data.total_income;
                document.getElementById('speed').innerText = Math.round(data.speed_kmh);
                document.getElementById('pCount').innerText = data.passengers;
                document.getElementById('brake').innerText = data.brake_temp_c.toFixed(1);
                document.getElementById('fuelPct').innerText = Math.round(data.fuel_level);
                document.getElementById('availSeats').innerText = (50 - data.passengers - bookedSeatsCount) + " Avail";

                updateGraph(liveChart, data.speed_kmh);
                updateGraph(fuelTrend, data.fuel_level);

                if(data.gps_fixed && data.gps_lat !== 0) {
                    const pos = [data.gps_lat, data.gps_lng];
                    busMarker.setLatLng(pos);
                    pathLine.addLatLng(pos);
                    map.panTo(pos);

                    // Proximity Alert & Distance Calculation
                    let distance = map.distance(pos, userLocation);
                    const alertBox = document.getElementById('proximityAlert');
                    (distance < 500) ? alertBox.classList.remove('hidden') : alertBox.classList.add('hidden');

                    if(lastPos && data.speed_kmh > 2) {
                        totalDistance += map.distance(pos, lastPos) / 1000;
                    }
                    lastPos = pos;
                    document.getElementById('totalDist').innerText = totalDistance.toFixed(2);
                    
                    let eta = data.speed_kmh > 2 ? (distance / 1000 / data.speed_kmh) * 60 : 0;
                    document.getElementById('eta').innerText = eta > 0 ? Math.round(eta) : "--";

                    // Log Data for Excel
                    busHistory.push({
                        Time: new Date().toLocaleTimeString(),
                        Route: document.getElementById('fromLoc').value + " to " + document.getElementById('toLoc').value,
                        Speed: data.speed_kmh,
                        Income: data.total_income,
                        Lat: data.gps_lat,
                        Lng: data.gps_lng
                    });
                }
            } catch (e) { document.getElementById('espStatus').innerText = "ESP32: OFFLINE"; }
        }

        function updateGraph(chart, val) {
            chart.data.datasets[0].data.push(val);
            if(chart.data.datasets[0].data.length > 15) chart.data.datasets[0].data.shift();
            chart.update('none');
        }

        function confirmBooking() {
            bookedSeatsCount = document.querySelectorAll('.booked').length;
            alert(bookedSeatsCount + " Seats reserved successfully!");
        }

        function exportToExcel() {
            const ws = XLSX.utils.json_to_sheet(busHistory);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Journey Report");
            XLSX.writeFile(wb, "Bus_Fleet_Report.xlsx");
        }

        window.onload = init;
    </script>
</body>
</html>
